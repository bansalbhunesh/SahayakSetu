services:
  - type: web
    name: sahayaksetu-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CHAT_MODEL
        value: gpt-4o-mini
      - sync: false
        key: QDRANT_URL
      - sync: false
        key: QDRANT_API_KEY
      - sync: false
        key: OPENAI_API_KEY
      - sync: false
        key: VAPI_API_KEY
      - sync: false
        key: VAPI_PUBLIC_KEY
