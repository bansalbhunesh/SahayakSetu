services:
  - type: web
    plan: free
    name: sahayaksetu-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: CHAT_MODEL
        value: gemini-2.0-flash
      - sync: false
        key: QDRANT_URL
      - sync: false
        key: QDRANT_API_KEY
      - sync: false
        key: GEMINI_API_KEY
      - sync: false
        key: GROQ_API_KEY
      - sync: false
        key: BACKEND_URL
